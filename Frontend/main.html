<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJET CDA - Dashboard Multi-Ligue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-[2rem] shadow-2xl overflow-hidden">
        
        <header class="border-b border-gray-100 px-8 py-4 flex flex-col md:flex-row items-center justify-between gap-6 bg-white/80 backdrop-blur-md sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-200">P</div>
                <h1 class="text-xl font-bold text-gray-900">CDA Bet</h1>
            </div>

            <div class="flex items-center gap-3">
                <label for="league-select" class="text-xs font-bold text-gray-400 uppercase">Championnat :</label>
                <select id="league-select" onchange="changeLeague()" class="bg-gray-50 border border-gray-200 text-gray-700 text-sm font-semibold rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none transition-all cursor-pointer">
                    <option value="4334">Ligue 1 (France)</option>
                    <option value="4328">Premier League (UK)</option>
                    <option value="4335">La Liga (Espagne)</option>
                    <option value="4332">Serie A (Italie)</option>
                    <option value="4331">Bundesliga (Allemagne)</option>
                    <option value="4346">Matchs Inter (USA MLS)</option>
                </select>
            </div>

            <div class="hidden md:flex items-center gap-4 bg-gray-50 p-2 pr-5 rounded-2xl border border-gray-100">
                <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 font-bold">LM</div>
                <span class="text-sm font-bold text-gray-800">Massako Lucas</span>
            </div>
        </header>

        <main class="p-8">
            <div class="mb-8">
                <h2 id="league-title" class="text-2xl font-extrabold text-gray-900 tracking-tight">Prochains Matchs</h2>
                <p class="text-sm text-gray-500">Sélectionnez une ligue pour voir plus d'événements.</p>
            </div>

            <div id="container-next" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
                </div>

            <div class="flex items-center gap-3 mb-6">
                <h2 class="text-xl font-bold text-gray-400">Derniers scores</h2>
                <div class="h-px flex-1 bg-gray-100"></div>
            </div>
            <div id="container-past" class="grid grid-cols-1 md:grid-cols-3 gap-3 opacity-80">
                </div>
        </main>
    </div>

    <script>
        const API_BASE = "https://www.thesportsdb.com/api/v1/json/123";

        async function fetchLeagueData(leagueId) {
            try {
                // On vide les conteneurs pour l'effet de chargement
                document.getElementById('container-next').innerHTML = '<p class="text-gray-400 italic">Mise à jour...</p>';
                
                const [nextResp, pastResp] = await Promise.all([
                    fetch(`${API_BASE}/eventsnextleague.php?id=${leagueId}`),
                    fetch(`${API_BASE}/eventspastleague.php?id=${leagueId}`)
                ]);

                const nextData = await nextResp.json();
                const pastData = await pastResp.json();

                renderNext(nextData.events || []);
                renderPast(pastData.events || []);
            } catch (error) {
                console.error("Erreur API:", error);
            }
        }

        function renderNext(events) {
            const container = document.getElementById('container-next');
            container.innerHTML = ''; 

            if (events.length === 0) {
                container.innerHTML = '<p class="text-gray-400">Aucun match à venir pour cette ligue.</p>';
                return;
            }

            // On affiche jusqu'à 15 matchs pour remplir la vue
            events.slice(0,1).forEach(event => {
                container.innerHTML += `
                <div class="bg-white border border-gray-100 p-5 rounded-2xl flex items-center justify-between hover:border-indigo-200 hover:shadow-md transition-all">
                    <div class="flex flex-col gap-1 flex-1">
                        <span class="text-[10px] font-bold text-indigo-500 uppercase">${event.dateEvent}</span>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-gray-800">${event.strHomeTeam}</span>
                            <span class="text-gray-300 font-bold text-xs">vs</span>
                            <span class="font-bold text-gray-800">${event.strAwayTeam}</span>
                        </div>
                        <span class="text-[10px] text-gray-400">${event.strTime ? event.strTime.substring(0,5) : 'À définir'}
                    </div>
                    <button class="ml-4 bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-indigo-600 hover:text-white transition">
                        Cotes
                    </button>
                </div>`;
            });
        }

        function renderPast(events) {
            const container = document.getElementById('container-past');
            container.innerHTML = '';

            events.slice(0, 12).forEach(event => {
                container.innerHTML += `
                <div class="bg-gray-50/50 border border-gray-100 p-3 rounded-xl flex justify-between items-center">
                    <div class="flex flex-col flex-1 truncate">
                        <span class="text-[10px] font-bold text-gray-600 truncate">${event.strHomeTeam}</span>
                        <span class="text-[10px] font-bold text-gray-600 truncate">${event.strAwayTeam}</span>
                    </div>
                    <div class="bg-white px-2 py-1 rounded border border-gray-100 font-black text-xs text-indigo-600 shadow-sm ml-2">
                        ${event.intHomeScore} - ${event.intAwayScore}
                    </div>
                </div>`;
            });
        }

        function changeLeague() {
            const select = document.getElementById('league-select');
            const leagueId = select.value;
            fetchLeagueData(leagueId);
        }

        // Chargement initial
        fetchLeagueData("4334");
    </script>
</body>
</html>
