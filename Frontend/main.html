<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA Bet - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; }
        .cote-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
    <script src="./auth.js"></script>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto bg-white rounded-[2rem] shadow-2xl overflow-hidden relative">
        
        <header class="border-b border-gray-100 px-8 py-4 flex flex-col md:flex-row items-center justify-between gap-6 bg-white/80 backdrop-blur-md sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-200">⚽</div>
                <h1 class="text-xl font-bold text-gray-900">CDA Bet</h1>
            </div>

            <div class="flex items-center gap-3">
                <label for="league-select" class="text-xs font-bold text-gray-400 uppercase">Championnat :</label>
                <select id="league-select" onchange="changeLeague()" class="bg-gray-50 border border-gray-200 text-gray-700 text-sm font-semibold rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer transition-all">
                    <option value="4334">Ligue 1 (France)</option>
                    <option value="4328">Premier League (UK)</option>
                    <option value="4335">La Liga (Espagne)</option>
                    <option value="4332">Serie A (Italie)</option>
                    <option value="4331">Bundesliga (Allemagne)</option>
                </select>
            </div>

            <div class="hidden md:flex items-center gap-4 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                <button onclick="window.location.href='board.html'" class="text-indigo-600 hover:bg-indigo-100 bg-white shadow-sm font-bold text-sm px-3 py-1.5 rounded-lg border border-indigo-100 flex items-center gap-2 transition">
                    🏆 Leaderboard
                </button>

                <div class="bg-yellow-100 text-yellow-700 px-3 py-1.5 rounded-xl text-xs font-black flex items-center gap-1 shadow-sm">
                    🪙 <span id="pointsDisplay">1000</span> pts
                </div>

                <div class="flex items-center gap-2 px-2 border-l border-gray-200">
                    <div class="w-7 h-7 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 text-xs font-bold">👤</div>
                    <span id="userNameDisplay" class="text-sm font-bold text-gray-800">...</span>
                </div>
                <button onclick="logout()" class="bg-red-50 text-red-600 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-xl text-xs font-bold transition">
                    Déconnexion
                </button>
            </div>
        </header>

        <main class="p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 bg-gray-50/30">
            
            <div class="lg:col-span-8">
                <div class="mb-6">
                    <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">Prochains Matchs</h2>
                    <p id="league-subtitle" class="text-sm text-gray-500 italic">Chargement des matchs...</p>
                </div>

                <div id="container-next" class="flex flex-col gap-4 mb-12"></div>

                <div class="flex items-center gap-3 mb-6">
                    <h2 class="text-xl font-bold text-gray-400">Derniers scores</h2>
                    <div class="h-px flex-1 bg-gray-200"></div>
                </div>
                <div id="container-past" class="grid grid-cols-1 md:grid-cols-2 gap-3 opacity-80 mb-8"></div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-6">
                
                <div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm sticky top-24">
                    <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2 border-b border-gray-100 pb-3">
                        📝 Mes Pronostics
                    </h3>
                    <div id="bet-slip-empty" class="text-center py-4">
                        <p class="text-xs text-gray-400 italic">Cliquez sur une cote pour ajouter un pronostic.</p>
                    </div>
                </div>

                <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden flex flex-col max-h-[500px]">
                    <div class="p-4 bg-gray-50 border-b border-gray-100">
                        <h3 class="font-black text-gray-800 text-sm uppercase tracking-widest flex items-center gap-2">
                            📊 Classement <span id="side-ranking-name" class="text-indigo-600 italic text-xs"></span>
                        </h3>
                    </div>
                    <div class="overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left">
                            <thead class="bg-white sticky top-0 text-[9px] text-gray-400 uppercase border-b border-gray-100">
                                <tr>
                                    <th class="p-3 w-8">#</th>
                                    <th class="p-3">Club</th>
                                    <th class="p-3 text-right">Pts</th>
                                </tr>
                            </thead>
                            <tbody id="ranking-body-side" class="divide-y divide-gray-50">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        const API_BASE = "https://www.thesportsdb.com/api/v1/json/123";

        async function fetchLeagueData(leagueId) {
            const select = document.getElementById('league-select');
            const leagueName = select.options[select.selectedIndex].text;
            document.getElementById('league-subtitle').textContent = `Misez vos points sur la ${leagueName}`;
            document.getElementById('side-ranking-name').textContent = leagueName;

            try {
                const [nextResp, pastResp, rankResp] = await Promise.all([
                    fetch(`${API_BASE}/eventsnextleague.php?id=${leagueId}`),
                    fetch(`${API_BASE}/eventspastleague.php?id=${leagueId}`),
                    fetch(`${API_BASE}/lookuptable.php?l=${leagueId}&s=2023-2024`) 
                ]);

                const nextData = await nextResp.json();
                const pastData = await pastResp.json();
                const rankData = await rankResp.json();

                renderNext(nextData.events || []);
                renderPast(pastData.events || []);
                renderSideRanking(rankData.table || []);
            } catch (error) {
                console.error("Erreur API:", error);
            }
        }

        function renderSideRanking(table) {
            const container = document.getElementById('ranking-body-side');
            container.innerHTML = '';
            
            if (table.length === 0) {
                container.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-xs text-gray-400 italic">Non disponible</td></tr>';
                return;
            }

            table.forEach(team => {
                container.innerHTML += `
                <tr class="hover:bg-indigo-50/30 transition">
                    <td class="p-3 text-[11px] font-bold text-gray-400 text-center">${team.intRank}</td>
                    <td class="p-3 flex items-center gap-2">
                        <img src="${team.strTeamBadge}" class="w-4 h-4 object-contain">
                        <span class="text-xs font-bold text-gray-700 truncate max-w-[100px]">${team.strTeam}</span>
                    </td>
                    <td class="p-3 text-right font-black text-indigo-600 text-xs">${team.intPoints}</td>
                </tr>`;
            });
        }

        function renderNext(events) {
            const container = document.getElementById('container-next');
            container.innerHTML = ''; 

            if (events.length === 0) {
                container.innerHTML = '<div class="bg-gray-50 p-6 rounded-2xl text-center text-gray-500 font-medium border border-dashed border-gray-200 text-xs text-gray-400 italic">Aucun match programmé pour le moment.</div>';
                return;
            }

            events.slice(0, 5).forEach(event => {
                const cote1 = (Math.random() * (2.5 - 1.1) + 1.1).toFixed(2);
                const coteN = (Math.random() * (4.5 - 2.5) + 2.5).toFixed(2);
                const cote2 = (Math.random() * (3.5 - 1.5) + 1.5).toFixed(2);

                container.innerHTML += `
                <div class="bg-white border border-gray-200 p-4 rounded-xl flex flex-col md:flex-row items-center justify-between shadow-sm hover:border-indigo-200 transition-all">
                    <div class="flex flex-col gap-1 flex-1">
                        <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest">${event.dateEvent}</span>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="font-bold text-gray-800 text-sm truncate">${event.strHomeTeam}</span>
                            <span class="text-gray-300 font-black text-[10px]">VS</span>
                            <span class="font-bold text-gray-800 text-sm truncate">${event.strAwayTeam}</span>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-3 md:mt-0">
                        ${[
                            {label: '1', cote: cote1},
                            {label: 'N', cote: coteN},
                            {label: '2', cote: cote2}
                        ].map((item) => `
                            <button class="cote-btn bg-gray-50 border border-gray-100 hover:bg-indigo-600 hover:text-white px-4 py-2 rounded-lg transition-all flex flex-col items-center min-w-[55px]">
                                <span class="text-[8px] uppercase font-bold opacity-60">${item.label}</span>
                                <span class="text-xs font-black">${item.cote}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>`;
            });
        }

        function renderPast(events) {
            const container = document.getElementById('container-past');
            container.innerHTML = '';
            events.slice(0, 6).forEach(event => {
                container.innerHTML += `
                <div class="bg-white border border-gray-100 p-3 rounded-xl flex justify-between items-center shadow-sm">
                    <span class="text-[10px] font-bold text-gray-600 truncate flex-1 text-right pr-2">${event.strHomeTeam}</span>
                    <div class="bg-gray-100 text-indigo-600 border border-gray-200 px-2 py-0.5 rounded font-black text-[10px]">${event.intHomeScore} - ${event.intAwayScore}</div>
                    <span class="text-[10px] font-bold text-gray-600 truncate flex-1 text-left pl-2">${event.strAwayTeam}</span>
                </div>`;
            });
        }

        function changeLeague() {
            const select = document.getElementById('league-select');
            fetchLeagueData(select.value);
        }

        fetchLeagueData("4334");
    </script>
</body>
</html>
