<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA Bet - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if(localStorage.getItem('cdabet_theme')==='dark')document.documentElement.classList.add('dark');</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; }
        .cote-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
    <script src="./auth.js"></script>
    <script src="./theme.js"></script>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto bg-white rounded-[2rem] shadow-2xl overflow-hidden relative">
        
        <header class="border-b border-gray-100 px-8 py-4 flex flex-col md:flex-row items-center justify-between gap-6 bg-white/80 backdrop-blur-md sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-200">⚽</div>
                <h1 class="text-xl font-bold text-gray-900">CDA Bet</h1>
            </div>

            <div class="flex items-center gap-3">
                <label for="league-select" class="text-xs font-bold text-gray-400 uppercase" data-i18n="main.champ">Championnat :</label>
                <select id="league-select" onchange="changeLeague()" class="bg-gray-50 border border-gray-200 text-gray-700 text-sm font-semibold rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer transition-all">
                    <option value="wc2026" selected>🌍 Coupe du Monde 2026</option>
                    <option value="4480">🏆 Ligue des Champions</option>
                    <option value="4334">🇫🇷 Ligue 1</option>
                    <option value="4328">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</option>
                    <option value="4335">🇪🇸 La Liga</option>
                    <option value="4332">🇮🇹 Serie A</option>
                    <option value="4331">🇩🇪 Bundesliga</option>
                </select>
            </div>

            <div class="hidden md:flex items-center gap-4 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                <button onclick="window.location.href='board.html'" class="text-indigo-600 hover:bg-indigo-100 bg-white shadow-sm font-bold text-sm px-3 py-1.5 rounded-lg border border-indigo-100 flex items-center gap-2 transition">
                    🏆 Leaderboard
                </button>
                <button id="adminBtn" onclick="window.location.href='admin.html'"
                    class="hidden bg-red-50 text-red-600 hover:bg-red-600 hover:text-white font-bold text-sm px-3 py-1.5 rounded-lg border border-red-200 flex items-center gap-1 transition">
                    ⚙️ Admin
                </button>

                <div class="bg-yellow-100 text-yellow-700 px-3 py-1.5 rounded-xl text-xs font-black flex items-center gap-1 shadow-sm">
                    🪙 <span id="pointsDisplay">1000</span> pts
                </div>

                <div class="flex items-center gap-2 px-2 border-l border-gray-200">
                    <a href="profile.html" title="Mon profil"
                       id="navAvatarDisplay"
                       class="w-7 h-7 rounded-full flex items-center justify-center text-base cursor-pointer hover:scale-110 transition-transform"
                       style="background: #6366f1">⚽</a>
                    <span id="userNameDisplay" class="text-sm font-bold text-gray-800">...</span>
                </div>
                <button onclick="logout()" class="bg-red-50 text-red-600 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-xl text-xs font-bold transition">
                    Déconnexion
                </button>
            </div>
        </header>

        <main class="p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 bg-gray-50/30">
            
            <div class="lg:col-span-8">
                <div class="mb-6">
                    <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight" data-i18n="main.title">Prochains Matchs</h2>
                    <p id="league-subtitle" class="text-sm text-gray-500 italic">Chargement des matchs...</p>
                </div>

                <div id="container-next" class="flex flex-col gap-4 mb-12"></div>

                <div class="flex items-center gap-3 mb-6">
                    <h2 class="text-xl font-bold text-gray-400" data-i18n="main.past">Derniers scores</h2>
                    <div class="h-px flex-1 bg-gray-200"></div>
                </div>
                <div id="container-past" class="grid grid-cols-1 md:grid-cols-2 gap-3 opacity-80 mb-8"></div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-6">
                
                <div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm sticky top-24 max-h-[420px] flex flex-col">
                    <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2 border-b border-gray-100 pb-3 shrink-0" data-i18n="main.bets">
                        📝 Mes Pronostics
                    </h3>
                    <div id="bet-list" class="flex flex-col gap-2 overflow-y-auto custom-scrollbar">
                        <p class="text-xs text-gray-400 italic text-center py-4">Chargement...</p>
                    </div>
                </div>

                <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden flex flex-col max-h-[500px]">
                    <div class="p-4 bg-gray-50 border-b border-gray-100">
                        <h3 class="font-black text-gray-800 text-sm uppercase tracking-widest flex items-center gap-2">
                            📊 Classement <span id="side-ranking-name" class="text-indigo-600 italic text-xs"></span>
                        </h3>
                    </div>
                    <div class="overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left">
                            <thead class="bg-white sticky top-0 text-[9px] text-gray-400 uppercase border-b border-gray-100">
                                <tr>
                                    <th class="p-3 w-8">#</th>
                                    <th class="p-3">Club</th>
                                    <th class="p-3 text-right">Pts</th>
                                </tr>
                            </thead>
                            <tbody id="ranking-body-side" class="divide-y divide-gray-50">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Modal Pari -->
    <div id="bet-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <h3 class="font-black text-gray-900 text-lg">Placer un pari</h3>
                <button onclick="closeBetModal()" class="text-gray-400 hover:text-gray-700 text-2xl font-bold leading-none">&times;</button>
            </div>
            <div class="bg-gray-50 rounded-xl p-3 flex flex-col gap-1">
                <span id="modal-match" class="text-sm font-bold text-gray-800"></span>
                <div class="flex items-center gap-2">
                    <span id="modal-pronostic-label" class="text-xs bg-indigo-100 text-indigo-700 font-black px-2 py-0.5 rounded"></span>
                    <span id="modal-cote" class="text-xs text-gray-500 font-bold"></span>
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Mise (points)</label>
                <input id="modal-mise" type="number" min="1" placeholder="ex: 100"
                    class="border border-gray-200 rounded-xl px-4 py-2 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 w-full"/>
                <span id="modal-gain-preview" class="text-xs text-green-600 font-bold mt-1"></span>
            </div>
            <button onclick="confirmBet()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded-xl transition text-sm">
                Confirmer le pari
            </button>
            <p id="modal-error" class="text-red-500 text-xs text-center font-bold hidden"></p>
        </div>
    </div>

    <script>
        const API_BASE = "https://www.thesportsdb.com/api/v1/json/123";
        // ⚙️ URL auto-détectée : localhost en dev, Railway en prod
        const BACKEND = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
          ? 'http://localhost:8000'
          : 'https://api-production-0502.up.railway.app';

        // --- BANKROLL ---
        async function loadBankroll() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${BACKEND}/api/users/profile`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('userName');
                    window.location.href = 'log.html';
                    return;
                }
                if (!res.ok) return;
                const data = await res.json();
                document.getElementById('pointsDisplay').textContent = data.bankroll;
                const navAvatar = document.getElementById('navAvatarDisplay');
                if (navAvatar && data.avatar) {
                    navAvatar.textContent = data.avatar.emoji;
                    navAvatar.style.background = data.avatar.couleur;
                }
                // Afficher bouton admin si l'utilisateur est admin
                if (data.is_admin) {
                    const adminBtn = document.getElementById('adminBtn');
                    if (adminBtn) adminBtn.classList.remove('hidden');
                }
            } catch (e) { /* serveur pas encore démarré */ }
        }

        // --- BET MODAL ---
        let pendingBet = null;

        function openBetModal(event, pronosticLabel, pronosticValue, cote) {
            pendingBet = {
                event_id: event.idEvent,
                home_team: event.strHomeTeam,
                away_team: event.strAwayTeam,
                date: event.dateEvent,
                pronostic: pronosticValue,
                cote: parseFloat(cote)
            };
            document.getElementById('modal-match').textContent = `${event.strHomeTeam} vs ${event.strAwayTeam}`;
            document.getElementById('modal-pronostic-label').textContent = pronosticLabel;
            document.getElementById('modal-cote').textContent = `Cote : ${cote}`;
            document.getElementById('modal-mise').value = '';
            document.getElementById('modal-gain-preview').textContent = '';
            document.getElementById('modal-error').classList.add('hidden');
            document.getElementById('bet-modal').classList.remove('hidden');
            document.getElementById('modal-mise').focus();
        }

        function closeBetModal() {
            document.getElementById('bet-modal').classList.add('hidden');
            pendingBet = null;
        }

        document.getElementById('modal-mise').addEventListener('input', () => {
            const mise = parseFloat(document.getElementById('modal-mise').value);
            const gain = pendingBet ? (mise * pendingBet.cote).toFixed(2) : 0;
            document.getElementById('modal-gain-preview').textContent =
                mise > 0 ? `Gain potentiel : ${gain} pts` : '';
        });

        async function confirmBet() {
            if (!pendingBet) return;
            const mise = parseInt(document.getElementById('modal-mise').value);
            if (!mise || mise <= 0) {
                showModalError("Entrez une mise valide.");
                return;
            }

            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${BACKEND}/api/bets/place`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ ...pendingBet, mise })
                });
                const data = await res.json();
                if (!res.ok) {
                    showModalError(data.message || "Erreur lors du pari.");
                    return;
                }
                document.getElementById('pointsDisplay').textContent = data.newBankroll;
                closeBetModal();
                showToast("Pari enregistré !");
                loadBetHistory();
            } catch (e) {
                showModalError("Impossible de contacter le serveur.");
            }
        }

        function showModalError(msg) {
            const el = document.getElementById('modal-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-green-500 text-white font-bold px-6 py-3 rounded-2xl shadow-xl z-50 text-sm';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // --- WORLD CUP : charge depuis notre backend ---
        async function fetchWorldCupMatches() {
            const token = localStorage.getItem('token');
            document.getElementById('league-subtitle').textContent = 'Misez vos points sur la Coupe du Monde 2026';
            document.getElementById('side-ranking-name').textContent = 'Coupe du Monde';
            document.getElementById('container-past').innerHTML = '';
            document.getElementById('ranking-body-side').innerHTML =
                '<tr><td colspan="3" class="p-4 text-center text-xs text-gray-400 italic">Classement non disponible en phase de groupes</td></tr>';

            try {
                const res = await fetch(`${BACKEND}/api/matches`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('API non disponible');
                const matches = await res.json();
                renderNextFromDB(matches);
            } catch (err) {
                document.getElementById('container-next').innerHTML =
                    '<div class="bg-red-50 p-6 rounded-2xl text-center text-red-400 border border-dashed border-red-200 text-xs italic">Impossible de charger les matchs. Le serveur est-il démarré ?</div>';
            }
        }

        function renderNextFromDB(matches) {
            const container = document.getElementById('container-next');
            container.innerHTML = '';

            const upcoming = matches.filter(m => !m.scorefinal);

            if (upcoming.length === 0) {
                container.innerHTML = '<div class="bg-gray-50 p-6 rounded-2xl text-center border border-dashed border-gray-200 text-xs text-gray-400 italic">Aucun match à venir.</div>';
                return;
            }

            upcoming.forEach(match => {
                const dateObj = new Date(match.dateheure);
                const dateStr = dateObj.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'long' });
                const heureStr = dateObj.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

                const cotes = [
                    { label: '1', value: 1, cote: parseFloat(match.cote_1).toFixed(2) },
                    { label: 'N', value: 0, cote: parseFloat(match.cote_n).toFixed(2) },
                    { label: '2', value: 2, cote: parseFloat(match.cote_2).toFixed(2) }
                ];

                // Adapter au format attendu par openBetModal
                const eventObj = {
                    idEvent:     match.id_external || String(match.id_match),
                    strHomeTeam: match.equipe_domicile,
                    strAwayTeam: match.equipe_exterieur,
                    dateEvent:   dateStr
                };

                const card = document.createElement('div');
                card.className = 'bg-white border border-gray-200 p-4 rounded-xl flex flex-col md:flex-row items-center justify-between shadow-sm hover:border-indigo-200 transition-all';
                card.innerHTML = `
                    <div class="flex flex-col gap-1 flex-1">
                        <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest">${dateStr} · ${heureStr}</span>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="font-bold text-gray-800 text-sm">${match.equipe_domicile}</span>
                            <span class="text-gray-300 font-black text-[10px]">VS</span>
                            <span class="font-bold text-gray-800 text-sm">${match.equipe_exterieur}</span>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-3 md:mt-0" id="cotes-db-${match.id_match}"></div>
                `;
                container.appendChild(card);

                const cotesContainer = card.querySelector(`#cotes-db-${match.id_match}`);
                cotes.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'cote-btn bg-gray-50 border border-gray-100 hover:bg-indigo-600 hover:text-white px-4 py-2 rounded-lg transition-all flex flex-col items-center min-w-[55px]';
                    btn.innerHTML = `<span class="text-[8px] uppercase font-bold opacity-60">${item.label}</span><span class="text-xs font-black">${item.cote}</span>`;
                    btn.addEventListener('click', () => openBetModal(eventObj, item.label, item.value, item.cote));
                    cotesContainer.appendChild(btn);
                });
            });
        }

        // --- LEAGUE DATA (TheSportsDB pour les championnats) ---
        async function fetchLeagueData(leagueId) {
            if (leagueId === 'wc2026') {
                return fetchWorldCupMatches();
            }

            const select = document.getElementById('league-select');
            const leagueName = select.options[select.selectedIndex].text;
            document.getElementById('league-subtitle').textContent = `Misez vos points sur la ${leagueName}`;
            document.getElementById('side-ranking-name').textContent = leagueName;

            try {
                const token = localStorage.getItem('token');
                const [nextResp, pastResp, rankResp] = await Promise.all([
                    fetch(`${API_BASE}/eventsnextleague.php?id=${leagueId}`),
                    fetch(`${API_BASE}/eventspastleague.php?id=${leagueId}`),
                    fetch(`${API_BASE}/lookuptable.php?l=${leagueId}&s=2023-2024`)
                ]);

                const nextData = await nextResp.json();
                const pastData = await pastResp.json();
                const rankData = await rankResp.json();

                const events = nextData.events || [];
                let cotesMap = {};

                if (events.length > 0) {
                    const ids = events.map(e => e.idEvent);
                    try {
                        const cotesRes = await fetch(`${BACKEND}/api/matches/external-cotes`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                            body: JSON.stringify({ ids })
                        });
                        if (cotesRes.ok) cotesMap = await cotesRes.json();
                    } catch (e) { /* cotes non critiques, on continue */ }
                }

                renderNext(events, cotesMap);
                renderPast(pastData.events || []);
                renderSideRanking(rankData.table || []);
            } catch (error) {
                console.error("Erreur API TheSportsDB:", error);
            }
        }

        function renderSideRanking(table) {
            const container = document.getElementById('ranking-body-side');
            container.innerHTML = '';
            if (table.length === 0) {
                container.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-xs text-gray-400 italic">Non disponible</td></tr>';
                return;
            }
            table.forEach(team => {
                container.innerHTML += `
                <tr class="hover:bg-indigo-50/30 transition">
                    <td class="p-3 text-[11px] font-bold text-gray-400 text-center">${team.intRank}</td>
                    <td class="p-3 flex items-center gap-2">
                        <img src="${team.strTeamBadge}" class="w-4 h-4 object-contain">
                        <span class="text-xs font-bold text-gray-700 truncate max-w-[100px]">${team.strTeam}</span>
                    </td>
                    <td class="p-3 text-right font-black text-indigo-600 text-xs">${team.intPoints}</td>
                </tr>`;
            });
        }

        function renderNext(events, cotesMap) {
            const container = document.getElementById('container-next');
            container.innerHTML = '';

            if (events.length === 0) {
                container.innerHTML = '<div class="bg-gray-50 p-6 rounded-2xl text-center border border-dashed border-gray-200 text-xs text-gray-400 italic">Aucun match programmé pour le moment.</div>';
                return;
            }

            events.forEach(event => {
                const c = cotesMap[event.idEvent] || {};
                const cotes = [
                    { label: '1', value: 1, cote: parseFloat(c.cote_1 || 1.50).toFixed(2) },
                    { label: 'N', value: 0, cote: parseFloat(c.cote_n || 3.00).toFixed(2) },
                    { label: '2', value: 2, cote: parseFloat(c.cote_2 || 2.00).toFixed(2) }
                ];

                const card = document.createElement('div');
                card.className = 'bg-white border border-gray-200 p-4 rounded-xl flex flex-col md:flex-row items-center justify-between shadow-sm hover:border-indigo-200 transition-all';
                card.innerHTML = `
                    <div class="flex flex-col gap-1 flex-1">
                        <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest">${event.dateEvent}</span>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="font-bold text-gray-800 text-sm truncate">${event.strHomeTeam}</span>
                            <span class="text-gray-300 font-black text-[10px]">VS</span>
                            <span class="font-bold text-gray-800 text-sm truncate">${event.strAwayTeam}</span>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-3 md:mt-0" id="cotes-${event.idEvent}"></div>
                `;
                container.appendChild(card);

                const cotesContainer = card.querySelector(`#cotes-${event.idEvent}`);
                cotes.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'cote-btn bg-gray-50 border border-gray-100 hover:bg-indigo-600 hover:text-white px-4 py-2 rounded-lg transition-all flex flex-col items-center min-w-[55px]';
                    btn.innerHTML = `<span class="text-[8px] uppercase font-bold opacity-60">${item.label}</span><span class="text-xs font-black">${item.cote}</span>`;
                    btn.addEventListener('click', () => openBetModal(event, item.label, item.value, item.cote));
                    cotesContainer.appendChild(btn);
                });
            });
        }

        function renderPast(events) {
            const container = document.getElementById('container-past');
            container.innerHTML = '';
            if (events.length === 0) {
                container.innerHTML = '<div class="col-span-2 p-4 text-center text-xs text-gray-400 italic">Aucun résultat récent.</div>';
                return;
            }
            events.slice(0, 8).forEach(event => {
                container.innerHTML += `
                <div class="bg-white border border-gray-100 p-3 rounded-xl flex justify-between items-center shadow-sm">
                    <span class="text-[10px] font-bold text-gray-600 truncate flex-1 text-right pr-2">${event.strHomeTeam}</span>
                    <div class="flex flex-col items-center gap-0.5">
                        <div class="bg-gray-100 text-indigo-600 border border-gray-200 px-2 py-0.5 rounded font-black text-[10px]">${event.intHomeScore} - ${event.intAwayScore}</div>
                        <span class="text-[8px] text-gray-400">${event.dateEvent || ''}</span>
                    </div>
                    <span class="text-[10px] font-bold text-gray-600 truncate flex-1 text-left pl-2">${event.strAwayTeam}</span>
                </div>`;
            });
        }

        function changeLeague() {
            const select = document.getElementById('league-select');
            fetchLeagueData(select.value);
        }

        // --- HISTORIQUE DES PARIS ---
        async function loadBetHistory() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('bet-list');
            try {
                const res = await fetch(`${BACKEND}/api/bets/history`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error();
                const bets = await res.json();
                renderBetHistory(bets);
            } catch {
                container.innerHTML = '<p class="text-xs text-gray-400 italic text-center py-4">Impossible de charger les paris.</p>';
            }
        }

        function renderBetHistory(bets) {
            const container = document.getElementById('bet-list');
            if (bets.length === 0) {
                container.innerHTML = '<p class="text-xs text-gray-400 italic text-center py-4">Aucun pari placé pour l\'instant.</p>';
                return;
            }
            const pronosticLabel = { 1: '1', 0: 'N', 2: '2' };
            const statutStyle = {
                'EN_COURS': 'bg-yellow-100 text-yellow-700',
                'GAGNE':    'bg-green-100 text-green-700',
                'PERDU':    'bg-red-100 text-red-600'
            };
            container.innerHTML = bets.map(b => {
                const style = statutStyle[b.statut] || statutStyle['EN_COURS'];
                const gainPotentiel = (b.mise * b.cote).toFixed(0);
                return `
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-3 flex flex-col gap-1.5">
                    <div class="flex items-center justify-between gap-1">
                        <span class="text-[10px] font-bold text-gray-700 truncate flex-1">${b.equipe_domicile} vs ${b.equipe_exterieur}</span>
                        <span class="text-[9px] font-black px-1.5 py-0.5 rounded ${style} shrink-0">${window.t ? window.t('status.'+b.statut) : b.statut}</span>
                    </div>
                    <div class="flex items-center gap-2 text-[10px] text-gray-500 font-bold">
                        <span class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded font-black">${pronosticLabel[b.pronostic]}</span>
                        <span>Mise : <strong>${b.mise} pts</strong></span>
                        <span>·</span>
                        <span>Cote : <strong>${parseFloat(b.cote).toFixed(2)}</strong></span>
                        <span>·</span>
                        <span class="text-green-600">+${gainPotentiel} pts</span>
                    </div>
                </div>`;
            }).join('');
        }

        // Fermer le modal si on clique en dehors
        document.getElementById('bet-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('bet-modal')) closeBetModal();
        });

        // Toast recharge automatique si bonus reçu à la connexion
        const bonus = localStorage.getItem('bonusRecharge');
        if (bonus) {
            localStorage.removeItem('bonusRecharge');
            setTimeout(() => showToast(`🎁 Bankroll rechargée ! +${bonus} pts offerts`), 800);
        }

        loadBankroll();
        loadBetHistory();
        fetchLeagueData("wc2026");
    </script>
</body>
</html>
