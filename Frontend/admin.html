<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA Bet — Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if(localStorage.getItem('cdabet_theme')==='dark')document.documentElement.classList.add('dark');</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; }
    </style>
    <script src="./theme.js"></script>
</head>
<body class="p-4 md:p-8">

<div class="max-w-5xl mx-auto">

    <!-- Header -->
    <header class="bg-white rounded-2xl shadow-sm border border-gray-100 px-6 py-4 flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-red-200">⚙️</div>
            <div>
                <h1 class="text-xl font-bold text-gray-900">CDA Bet — Admin</h1>
                <p class="text-xs text-red-500 font-bold">Panel d'administration</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='main.html'"
                class="text-sm font-bold text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-xl border border-indigo-100 transition"
                data-i18n="nav.dashboard">
                🏠 Dashboard
            </button>
            <button onclick="logout()"
                class="bg-red-50 text-red-600 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-xl text-xs font-bold transition"
                data-i18n="nav.logout">
                Déconnexion
            </button>
        </div>
    </header>

    <!-- Stats rapides -->
    <div id="stats-bar" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

    <!-- Liste des matchs -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-5 border-b border-gray-100 pb-3 gap-3">
            <h2 class="font-black text-gray-900 text-base" data-i18n="admin.matches">⚽ Gestion des Matchs</h2>
            <div class="flex flex-wrap gap-2">
                <button onclick="filterMatches('all')"      id="btn-all"      class="filter-btn active text-xs font-bold px-3 py-1.5 rounded-lg border transition" data-i18n="admin.all">Tous</button>
                <button onclick="filterMatches('pending')"  id="btn-pending"  class="filter-btn text-xs font-bold px-3 py-1.5 rounded-lg border transition" data-i18n="admin.pending">En attente</button>
                <button onclick="filterMatches('resolved')" id="btn-resolved" class="filter-btn text-xs font-bold px-3 py-1.5 rounded-lg border transition" data-i18n="admin.resolved">Résolus</button>
                <button onclick="autoResolve()" id="btn-auto"
                    class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition flex items-center gap-1"
                    data-i18n="admin.sync">
                    🔄 Sync TheSportsDB
                </button>
            </div>
        </div>

        <div id="matches-list" class="flex flex-col gap-3">
            <div class="text-center py-8 text-gray-400 text-sm animate-pulse">Chargement des matchs...</div>
        </div>
    </div>

</div>

<!-- Modal résolution -->
<div id="resolve-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 flex flex-col gap-4">
        <div class="flex items-center justify-between">
            <h3 class="font-black text-gray-900 text-lg" data-i18n="admin.score">Entrer le score</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-2xl font-bold leading-none">&times;</button>
        </div>

        <div id="modal-match-name" class="bg-gray-50 rounded-xl p-3 text-sm font-bold text-gray-800 text-center"></div>

        <div class="grid grid-cols-3 items-center gap-3">
            <div class="flex flex-col gap-1">
                <label id="label-home" class="text-xs font-bold text-gray-500 text-center truncate">Domicile</label>
                <input id="score-home" type="number" min="0" max="99" value="0"
                    class="border-2 border-gray-200 rounded-xl px-3 py-3 text-2xl font-black text-center focus:outline-none focus:border-indigo-500 w-full"/>
            </div>
            <div class="text-center text-2xl font-black text-gray-300 pt-5">–</div>
            <div class="flex flex-col gap-1">
                <label id="label-away" class="text-xs font-bold text-gray-500 text-center truncate">Extérieur</label>
                <input id="score-away" type="number" min="0" max="99" value="0"
                    class="border-2 border-gray-200 rounded-xl px-3 py-3 text-2xl font-black text-center focus:outline-none focus:border-indigo-500 w-full"/>
            </div>
        </div>

        <div id="preview-result" class="text-center text-xs font-bold text-indigo-600 bg-indigo-50 py-2 rounded-xl"></div>

        <button onclick="confirmResolve()"
            class="bg-red-600 hover:bg-red-700 text-white font-black py-3 rounded-xl transition text-sm"
            data-i18n="admin.resolve">
            ✅ Valider et distribuer les gains
        </button>
        <p id="modal-error" class="text-red-500 text-xs text-center font-bold hidden"></p>
    </div>
</div>

<style>
    .filter-btn { background: white; color: #6b7280; border-color: #e5e7eb; }
    .filter-btn.active { background: #6366f1; color: white; border-color: #6366f1; }
</style>

<script>
    const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:8000'
      : 'https://api-production-0502.up.railway.app';
    let allMatches = [];
    let currentFilter = 'all';
    let pendingResolve = null;

    // ── Chargement ───────────────────────────────────────────────
    async function loadMatches() {
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API}/api/admin/matches`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.status === 403) {
                document.getElementById('matches-list').innerHTML =
                    '<div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center text-red-600 font-bold">⛔ Accès refusé — compte non administrateur.</div>';
                return;
            }
            if (!res.ok) throw new Error();
            allMatches = await res.json();
            renderStats();
            renderMatches();
        } catch {
            document.getElementById('matches-list').innerHTML =
                '<div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center text-red-400 text-sm">Impossible de charger les matchs. Serveur démarré ?</div>';
        }
    }

    // ── Stats ────────────────────────────────────────────────────
    function renderStats() {
        const total    = allMatches.length;
        const resolved = allMatches.filter(m => m.scorefinal).length;
        const pending  = total - resolved;
        const totalBets= allMatches.reduce((s, m) => s + parseInt(m.total_paris || 0), 0);

        const stats = [
            { label: 'Total matchs',   value: total,    color: 'indigo' },
            { label: 'À résoudre',     value: pending,  color: 'yellow' },
            { label: 'Résolus',        value: resolved, color: 'green'  },
            { label: 'Total paris',    value: totalBets,color: 'purple' },
        ];
        document.getElementById('stats-bar').innerHTML = stats.map(s => `
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 text-center">
                <div class="text-2xl font-black text-${s.color}-600">${s.value}</div>
                <div class="text-xs text-gray-500 font-bold mt-1">${s.label}</div>
            </div>`).join('');
    }

    // ── Rendu matchs ─────────────────────────────────────────────
    function renderMatches() {
        const container = document.getElementById('matches-list');
        let list = allMatches;

        if (currentFilter === 'pending')  list = allMatches.filter(m => !m.scorefinal);
        if (currentFilter === 'resolved') list = allMatches.filter(m =>  m.scorefinal);

        if (list.length === 0) {
            container.innerHTML = '<div class="text-center py-8 text-gray-400 text-sm italic">Aucun match dans cette catégorie.</div>';
            return;
        }

        container.innerHTML = list.map(m => {
            const dateObj   = new Date(m.dateheure);
            const dateStr   = dateObj.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
            const heureStr  = dateObj.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            const resolved  = !!m.scorefinal;
            const enCours   = parseInt(m.paris_en_cours  || 0);
            const gagnes    = parseInt(m.paris_gagnes    || 0);
            const perdus    = parseInt(m.paris_perdus    || 0);
            const totalBets = parseInt(m.total_paris     || 0);

            return `
            <div class="border ${resolved ? 'border-green-100 bg-green-50/30' : 'border-gray-100 bg-white'} rounded-xl p-4 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">

                <div class="flex flex-col gap-1 flex-1 min-w-0">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">${dateStr} · ${heureStr}</span>
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="font-black text-gray-900 text-sm truncate">${m.equipe_domicile}</span>
                        <span class="text-gray-300 font-black text-xs">VS</span>
                        <span class="font-black text-gray-900 text-sm truncate">${m.equipe_exterieur}</span>
                        ${resolved
                            ? `<span class="bg-green-100 text-green-700 font-black text-xs px-2 py-0.5 rounded-full">FT ${m.scorefinal}</span>`
                            : `<span class="bg-yellow-100 text-yellow-700 font-bold text-xs px-2 py-0.5 rounded-full">À jouer</span>`}
                    </div>
                </div>

                <div class="flex items-center gap-3 flex-wrap">
                    ${totalBets > 0 ? `
                    <div class="flex gap-2 text-[10px] font-bold">
                        <span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded-lg">${enCours} en cours</span>
                        <span class="bg-green-100 text-green-700 px-2 py-1 rounded-lg">${gagnes} gagnés</span>
                        <span class="bg-red-100 text-red-600 px-2 py-1 rounded-lg">${perdus} perdus</span>
                    </div>` : `<span class="text-xs text-gray-400 italic">Aucun pari</span>`}

                    ${!resolved
                        ? `<button onclick="openModal(${m.id_match}, '${m.equipe_domicile.replace(/'/g,"\\'")}', '${m.equipe_exterieur.replace(/'/g,"\\'")}', ${enCours})"
                                class="bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xs px-4 py-2 rounded-xl transition whitespace-nowrap">
                                ⚽ Entrer le score
                           </button>`
                        : `<span class="text-xs font-bold text-green-600 bg-green-100 px-3 py-2 rounded-xl">✅ Résolu</span>`}
                </div>
            </div>`;
        }).join('');
    }

    // ── Filtre ───────────────────────────────────────────────────
    function filterMatches(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${f}`).classList.add('active');
        renderMatches();
    }

    // ── Modal ────────────────────────────────────────────────────
    function openModal(matchId, home, away, enCours) {
        pendingResolve = { matchId, home, away };
        document.getElementById('modal-match-name').textContent = `${home}  vs  ${away}`;
        document.getElementById('label-home').textContent = home;
        document.getElementById('label-away').textContent = away;
        document.getElementById('score-home').value = '0';
        document.getElementById('score-away').value = '0';
        document.getElementById('modal-error').classList.add('hidden');
        updatePreview();

        if (enCours === 0) {
            document.getElementById('preview-result').textContent = '⚠️ Aucun pari en cours sur ce match';
        }

        document.getElementById('resolve-modal').classList.remove('hidden');
        document.getElementById('score-home').focus();
    }

    function closeModal() {
        document.getElementById('resolve-modal').classList.add('hidden');
        pendingResolve = null;
    }

    function updatePreview() {
        const h = parseInt(document.getElementById('score-home').value) || 0;
        const a = parseInt(document.getElementById('score-away').value) || 0;
        let label = '';
        if (h > a) label = `🏠 Victoire ${pendingResolve?.home || 'Domicile'} (pronostic 1)`;
        else if (a > h) label = `✈️ Victoire ${pendingResolve?.away || 'Extérieur'} (pronostic 2)`;
        else label = '🤝 Match nul (pronostic N)';
        document.getElementById('preview-result').textContent = label;
    }

    document.addEventListener('change', e => {
        if (e.target.id === 'score-home' || e.target.id === 'score-away') updatePreview();
    });
    document.addEventListener('input', e => {
        if (e.target.id === 'score-home' || e.target.id === 'score-away') updatePreview();
    });

    async function confirmResolve() {
        if (!pendingResolve) return;
        const home = parseInt(document.getElementById('score-home').value);
        const away = parseInt(document.getElementById('score-away').value);
        if (isNaN(home) || isNaN(away)) {
            showError('Entrez des scores valides.');
            return;
        }

        const token = localStorage.getItem('token');
        const btn   = document.querySelector('#resolve-modal button[onclick="confirmResolve()"]');
        btn.textContent = 'Résolution en cours...';
        btn.disabled = true;

        try {
            const res = await fetch(`${API}/api/admin/matches/${pendingResolve.matchId}/resolve`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ score_domicile: home, score_exterieur: away })
            });
            const data = await res.json();
            if (!res.ok) { showError(data.message); return; }

            closeModal();
            showToast(`✅ ${data.message} — ${data.paris_gagnes} gagnant(s), ${data.paris_perdus} perdant(s)`);
            await loadMatches();
        } catch {
            showError('Erreur réseau.');
        } finally {
            btn.textContent = window.t ? window.t('admin.resolve') : '✅ Valider et distribuer les gains';
            btn.disabled = false;
        }
    }

    // ── Auto-résolution TheSportsDB ──────────────────────────────
    async function autoResolve() {
        const btn   = document.getElementById('btn-auto');
        const token = localStorage.getItem('token');
        btn.textContent = '⏳ Synchronisation...';
        btn.disabled    = true;

        try {
            const res  = await fetch(`${API}/api/admin/auto-resolve`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            if (!res.ok) { showToast('❌ ' + data.message, 'red'); return; }

            const msg = data.resolved > 0
                ? `✅ ${data.resolved} match(s) résolu(s) automatiquement !`
                : `ℹ️ ${data.message}`;
            showToast(msg, data.resolved > 0 ? 'green' : 'blue');
            if (data.resolved > 0) await loadMatches();
        } catch {
            showToast('❌ Erreur réseau.', 'red');
        } finally {
            btn.textContent = window.t ? window.t('admin.sync') : '🔄 Sync TheSportsDB';
            btn.disabled    = false;
        }
    }

    // ── Helpers ──────────────────────────────────────────────────
    function showError(msg) {
        const el = document.getElementById('modal-error');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    function showToast(msg, color = 'green') {
        const colors = { green: 'bg-green-600', blue: 'bg-blue-600', red: 'bg-red-600' };
        const t = document.createElement('div');
        t.textContent = msg;
        t.className = `fixed bottom-6 left-1/2 -translate-x-1/2 ${colors[color] || colors.green} text-white font-bold px-6 py-3 rounded-2xl shadow-xl z-50 text-sm max-w-sm text-center`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 4000);
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('userName');
        window.location.href = 'log.html';
    }

    // Fermer modal en cliquant en dehors
    document.getElementById('resolve-modal').addEventListener('click', e => {
        if (e.target === document.getElementById('resolve-modal')) closeModal();
    });

    // ── Init ─────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = 'log.html'; return; }
        loadMatches();
    });
</script>
</body>
</html>
