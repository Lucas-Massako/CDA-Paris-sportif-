<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA Bet - Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if(localStorage.getItem('cdabet_theme')==='dark')document.documentElement.classList.add('dark');</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
    <script src="./auth.js"></script>
    <script src="./theme.js"></script>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-[2rem] shadow-2xl overflow-hidden relative flex flex-col h-[90vh]">
        
        <header class="border-b border-gray-100 px-8 py-4 flex items-center justify-between bg-white/80 backdrop-blur-md sticky top-0 z-40 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-200">⚽</div>
                <h1 class="text-xl font-bold text-gray-900">CDA Bet</h1>
            </div>

            <div class="hidden md:flex items-center gap-4 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                <button onclick="window.location.href='main.html'" class="text-indigo-600 hover:bg-indigo-100 bg-white shadow-sm font-bold text-sm px-4 py-1.5 rounded-lg border border-indigo-100 flex items-center gap-2 transition">
                    🏠 Retour aux pronostics
                </button>

                <div class="flex items-center gap-2 px-2 border-l border-gray-200">
                    <div class="w-7 h-7 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 text-xs font-bold">👤</div>
                    <span id="userNameDisplay" class="text-sm font-bold text-gray-800">...</span>
                </div>
                <button onclick="logout()" class="bg-red-50 text-red-600 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-xl text-xs font-bold transition">
                    Déconnexion
                </button>
            </div>
        </header>

        <main class="p-8 bg-gray-50/30 flex-1 overflow-hidden flex flex-col">
            
            <div class="mb-8 text-center">
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight flex items-center justify-center gap-3">
                    <span data-i18n="board.title">🏆 Classement Général</span>
                </h2>
                <p class="text-sm text-gray-500 mt-2" data-i18n="board.sub">Découvrez les meilleurs pronostiqueurs de la plateforme.</p>
            </div>

            <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden flex-1 flex flex-col max-w-4xl mx-auto w-full">
                <div class="overflow-y-auto custom-scrollbar flex-1">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 sticky top-0 border-b border-gray-200 z-10">
                            <tr class="text-xs text-gray-500 uppercase tracking-widest font-bold">
                                <th class="p-4 w-24 text-center" data-i18n="board.rank">Rang</th>
                                <th class="p-4" data-i18n="board.player">Joueur</th>
                                <th class="p-4 text-right w-32" data-i18n="board.points">Points</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-gray-50">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        // Fonction pour récupérer les utilisateurs et leurs points depuis le Backend
        async function fetchLeaderboard() {
            const container = document.getElementById('leaderboard-body');
            container.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-indigo-500 font-bold animate-pulse">Chargement du classement...</td></tr>';

            try {
                // ⚠️ PLUS TARD : Tu devras créer cette route dans ton Backend Node.js
                const token = localStorage.getItem('token');
                const BACKEND = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                  ? 'http://localhost:8000'
                  : 'https://api-production-0502.up.railway.app';
                const response = await fetch(`${BACKEND}/api/users/leaderboard`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (!response.ok) throw new Error("Route Backend non disponible");
                
                const users = await response.json();
                renderLeaderboard(users);

            } catch (error) {
                console.log("API Leaderboard pas encore prête. Affichage de fausses données pour le design.");
                
                // FAUSSES DONNÉES (Pour voir le design en attendant de coder le Backend)
                const mockUsers = [
                    { name: "Lucasmassako", points: 3450 },
                    { name: "az", points: 2800 },
                    { name: "Zinédine Z.", points: 9999 },
                    { name: "Kylian M.", points: 1500 },
                    { name: "Didier D.", points: 950 },
                    { name: "Thierry H.", points: 2006 },
                    { name: "Nouveau Joueur", points: 0 }
                ];
                
                // On simule un temps de chargement réseau
                setTimeout(() => renderLeaderboard(mockUsers), 500);
            }
        }

        // Fonction d'affichage du tableau
        function renderLeaderboard(users) {
            const container = document.getElementById('leaderboard-body');
            container.innerHTML = '';

            if (users.length === 0) {
                container.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-gray-400">Aucun joueur classé pour le moment.</td></tr>';
                return;
            }

            users.forEach((user, index) => {
                const rank = index + 1;
                let rankDisplay = `<span class="text-gray-500 font-bold text-sm">${rank}</span>`;
                let rowClass = "hover:bg-gray-50 transition";
                let textClass = "text-gray-700";

                // Design spécifique pour le Top 3 (Podium)
                if (rank === 1) {
                    rankDisplay = '<span class="text-2xl drop-shadow-md">🥇</span>';
                    rowClass = "bg-yellow-50/50 hover:bg-yellow-50";
                    textClass = "text-yellow-700 font-black";
                } else if (rank === 2) {
                    rankDisplay = '<span class="text-2xl drop-shadow-md">🥈</span>';
                    rowClass = "bg-gray-100 hover:bg-gray-200";
                    textClass = "text-gray-700 font-black";
                } else if (rank === 3) {
                    rankDisplay = '<span class="text-2xl drop-shadow-md">🥉</span>';
                    rowClass = "bg-gray-100 hover:bg-gray-200";
                    textClass = "text-gray-700 font-black";
                }

                const row = document.createElement('tr');
                row.className = rowClass;
                row.innerHTML = `
                    <td class="p-4 w-24 text-center">${rankDisplay}</td>
                    <td class="p-4 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center text-base flex-shrink-0"
                             style="background: ${user.avatar_couleur || '#e0e7ff'}">${user.avatar_emoji || '⚽'}</div>
                        <span class="${textClass} font-medium">${user.name}</span>
                    </td>
                    <td class="p-4 text-right w-32">
                        <span class="${textClass} font-bold">${user.points} pts</span>
                    </td>
                `;
                container.appendChild(row);
            });
        }
    

        // Afficher le nom de l'utilisateur connecté
        function displayUserName() {
            const userNameDisplay = document.getElementById('userNameDisplay');
            const userName = localStorage.getItem('userName') || 'Utilisateur';
            userNameDisplay.textContent = userName;
        }

        // Fonction de déconnexion
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userName');
            window.location.href = 'log.html';
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            displayUserName();
            fetchLeaderboard();
        });
    </script>
</body>
</html>
